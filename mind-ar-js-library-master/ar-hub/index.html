<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR Hub Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #12121a 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: -webkit-linear-gradient(#00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #b0b0c0;
            margin-bottom: 3rem;
            max-width: 80%;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 80%;
            max-width: 350px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 18px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 242, 254, 0.2);
            border-color: rgba(0, 242, 254, 0.4);
        }
        
        .btn:active {
            transform: translateY(1px);
        }

        .icon {
            font-size: 1.5rem;
        }
        
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(79,172,254,0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <h1>AR Magic Hub</h1>
    <p>Select an augmented reality experience to begin</p>

    <div class="menu-container">
        <!-- Link to Face Tracking mode -->
        <a href="./face-scanner.html" class="btn">
            <span class="icon">😎</span> Face Filters
        </a>
        
        <!-- Link to Image Tracking mode -->
        <a href="./image-scanner.html" class="btn">
            <span class="icon">🖼️</span> Photo Scanner
        </a>
    </div>
</body>
</html>
