<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photo Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <!-- We need aframe-extras to play embedded animations in the 3D model -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
      .back-button {
        position: absolute; top: 20px; left: 20px; z-index: 1000;
        background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid white;
        padding: 10px 15px; border-radius: 8px; font-weight: bold; text-decoration: none;
        backdrop-filter: blur(5px);
      }
      #scanning-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        background: rgba(0, 0, 0, 0.5); z-index: 2; pointer-events: none;
      }
      .scan-frame {
        width: 80vw; height: 50vw; max-width: 400px; max-height: 250px;
        border: 4px solid white; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        background: rgba(255, 255, 255, 0.1);
      }
      .instructions {
        margin-top: 20px; color: white; font-size: 1.2rem; font-weight: bold;
        text-shadow: 1px 1px 4px black; text-align: center;
      }
      body.target-found #scanning-overlay { display: none; }
    </style>
  </head>
  <body>
    <!-- Persistent Back Button -->
    <a href="index.html" class="back-button">← Back to Hub</a>

    <!-- User-Friendly Scanning Overlay -->
    <div id="scanning-overlay">
      <div class="scan-frame"></div>
      <div class="instructions" style="max-width: 300px; line-height: 1.4;">
        <strong>SCANNING</strong><br/>
        Point your camera at the target images.
      </div>
    </div>

    <!-- AR Scene Setup -->
    <a-scene mindar-image="imageTargetSrc: ../examples/image-tracking/assets/band-example/band.mind; showStats: false; autoStart: true; maxTrack: 1" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="raccoonModel" src="../examples/image-tracking/assets/band-example/raccoon/scene.gltf"></a-asset-item>
        <a-asset-item id="bearModel" src="../examples/image-tracking/assets/band-example/bear/scene.gltf"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Raccoon is targetIndex 0 -->
      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-gltf-model rotation="90 0 0" position="0 0 0" scale="0.05 0.05 0.05" src="#raccoonModel" animation-mixer></a-gltf-model>
      </a-entity>
      
      <!-- Bear is targetIndex 1 -->
      <a-entity id="target1" mindar-image-target="targetIndex: 1">
        <a-gltf-model rotation="90 0 0" position="0 0 0" scale="0.05 0.05 0.05" src="#bearModel" animation-mixer></a-gltf-model>
      </a-entity>
      
    </a-scene>

    <script>
      const target0 = document.querySelector('#target0');
      const target1 = document.querySelector('#target1');
      
      const found = () => document.body.classList.add("target-found");
      const lost = () => document.body.classList.remove("target-found");

      target0.addEventListener("targetFound", found);
      target0.addEventListener("targetLost", lost);
      target1.addEventListener("targetFound", found);
      target1.addEventListener("targetLost", lost);
    </script>
  </body>
</html>
